# French
# ------
fr: &DEFAULT_FR
  header:
    title: "Appartement d'été à Briançon"
    text: Randonnée, vélo & télétravail dans les Alpes
    button: Voir les infos
    buttonlink: "#services"

  services:
    title: "Informations de réservation"
    text: "Les détails essentiels pour organiser un séjour d'été"
    section: services
    list:
      - title: "Jusqu'à 4 personnes"
        desc: "Appartement de 45 m2 avec 2 chambres : une chambre double et une chambre avec deux lits simples."
        icon: fas fa-bed
      - title: "Disponibilité d'été"
        desc: "Disponible en juillet, août et première quinzaine de septembre, avec un séjour minimum de 3 nuits."
        icon: fas fa-calendar-alt
      - title: "80-85 EUR / nuit"
        desc: "Tarif indicatif par nuit, taxe de séjour incluse. Des réductions pour les séjours plus longs peuvent être discutées."
        icon: fas fa-euro-sign
      - title: "Parking & accès"
        desc: "Parking pour une voiture. La vieille ville de Briançon est à environ 3 km et la gare à environ 2 km."
        icon: fas fa-car
      - title: "Prêt pour le télétravail"
        desc: "WiFi haut débit, cuisine compacte et cadre alpin calme pour les séjours plus longs."
        icon: fas fa-wifi
      - title: "Linge fourni"
        desc: "Draps et serviettes fournis. Arrivée à partir de 16h00 et départ jusqu'à 10h00."
        icon: fas fa-clock

  portfolio:
    title: "Galerie"
    text: "Découvrez l'appartement et ses environs"
    section: portfolio
    closebutton: "Fermer"

  timeline:
    title: "L'été à Briançon"
    text: "Un point de départ pratique pour les journées en montagne"
    section: timeline
    events:
      - title: "Randonnées"
        year: "Été"
        desc: "Briançon est une bonne base pour des randonnées à la journée, des vallées d'altitude, des lacs et des itinéraires panoramiques."
        image: assets/img/timeline/1.jpg
        alt: Randonnée alpine
      - title: "Itinéraires vélo"
        year: "Été"
        desc: "Venez avec votre vélo de route ou louez sur place pour profiter des cols alpins, des routes de vallée et des paysages de montagne."
        image: assets/img/timeline/2.jpg
        alt: Velo dans les Alpes
      - title: "Vieille ville Vauban"
        year: "Toute l'année"
        desc: "Explorez la vieille ville fortifiée de Briançon, située à environ 3 km de l'appartement."
        image: assets/img/timeline/3.jpg
        alt: Vieille ville de Briançon
      - title: "Marchés & cuisine locale"
        year: "Chaque semaine"
        desc: "Profitez des marchés locaux, des produits régionaux, des cafés et des soirées d'été après une journée dehors."
        image: assets/img/timeline/4.jpg
        alt: Marché local
        align: right

  about:
    title: "À propos de l'appartement"
    text: "Une base compacte pour l'été dans les Alpes"
    body: "Cet appartement de 45 m2 accueille jusqu'à 4 voyageurs dans 2 chambres et convient aux séjours d'été pour la randonnée, le vélo, le tourisme alpin et le télétravail. Il comprend une place de parking, le WiFi haut débit, une cuisine compacte, une vue sur les montagnes, les serviettes et les draps. La vieille ville de Briançon est à environ 3 km et la gare de Briançon à environ 2 km. L'appartement est disponible en juillet, août et pendant la première quinzaine de septembre, avec un séjour minimum de 3 nuits. Tarif indicatif : 80-85 EUR par nuit. L'arrivée se fait à partir de 16h00 et le départ jusqu'à 10h00. Des réductions pour les séjours plus longs peuvent être discutées."
    local_title: "Séjour d'été autour de Briançon"
    local_body: "L'appartement est une base pratique pour la randonnée à Briançon, les itinéraires vélo et les cols alpins, la visite de la Cité Vauban, ainsi que les sorties d'été vers la vallée de la Clarée, les Écrins, Serre Chevalier et Villard-Saint-Pancrace."
    section: about

  contact:
    title: "Demander les disponibilités"
    text: "Séjours d'été à partir de 3 nuits, de juillet à mi-septembre, 80-85 EUR par nuit. Des réductions pour les séjours plus longs peuvent être discutées."
    section: contact
    name: "Nom*"
    name-validation: "Veuillez saisir votre nom."
    email: "Email*"
    email-validation: "Veuillez saisir votre adresse email."
    phone: "Téléphone"
    phone-validation: "Veuillez saisir votre numéro de téléphone."
    message: "Message* - dates souhaitées, nombre de voyageurs et questions"
    message-validation: "Veuillez saisir un message."
    subject: "Demande de réservation appartement Briançon"
    submit: "Envoyer la demande"

  footer:
    legal: "Mentions légales & confidentialité"
