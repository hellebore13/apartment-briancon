en: &DEFAULT_EN
  header:
    title: Summer Apartment in Briançon
    text: Hiking, Cycling & Alpine Workdays
    button: Explore
    buttonlink: "#services"

  services:
    title: "Booking Information"
    text: "Key details for planning a summer stay"
    section: services
    list:
      - title: "Sleeps 4"
        desc: "45 m2 apartment with 2 bedrooms: one double bedroom and one twin bedroom."
        icon: fas fa-bed
      - title: "Summer Availability"
        desc: "Available in July, August, and the first half of September, with a 3-night minimum stay."
        icon: fas fa-calendar-alt
      - title: "80-85 EUR / Night"
        desc: "Indicative nightly rate, including taxe de séjour. Discounts for longer stays can be discussed."
        icon: fas fa-euro-sign
      - title: "Parking & Access"
        desc: "Parking for one car. Briançon old town is about 3 km away and Briançon train station is about 2 km away."
        icon: fas fa-car
      - title: "Remote-Work Ready"
        desc: "High-speed WiFi, a compact kitchen, and a calm Alpine setting for longer summer stays."
        icon: fas fa-wifi
      - title: "Linen Provided"
        desc: "Towels and bed linen are provided. Check-in from 16:00 and check-out until 10:00."
        icon: fas fa-clock

  portfolio:
    title: "Gallery"
    text: "Explore our beautiful apartment and surroundings"
    section: portfolio
    closebutton: "Close"

  timeline:
    title: "Summer in Briançon"
    text: "Easy access to Alpine days out"
    section: timeline
    # left is the default
    #start_align: "left"
    events:
      - title: "Hiking Trails"
        year: "Summer"
        desc: "Use Briançon as a base for day hikes, high valleys, lakes, and scenic routes across the surrounding Alps."
        image: assets/img/timeline/1.jpg
        alt: Alpine hiking
      - title: "Cycling Routes"
        year: "Summer"
        desc: "Bring your road bike or rent locally for classic Alpine climbs, valley rides, and mountain scenery."
        image: assets/img/timeline/2.jpg
        alt: Alpine cycling
      - title: "Vauban Old Town"
        year: "Year-Round"
        desc: "Explore Briançon's historic fortified old town, about 3 km from the apartment."
        image: assets/img/timeline/3.jpg
        alt: Briançon old town
      - title: "Local Markets & Cuisine"
        year: "Weekly"
        desc: "Enjoy local markets, regional food, cafes, and relaxed summer evenings after a day outdoors."
        image: assets/img/timeline/4.jpg
        alt: Local market
        align: right
    # end: "Book Your <br> Alpine <br> Adventure!"

  about:
    title: "About the Apartment"
    text: "A compact summer base in the Alps"
    body: "This 45 m2 apartment sleeps up to 4 guests across 2 bedrooms and is set up for summer hiking, cycling, general Alpine tourism, and remote-work stays. It includes parking for one car, high-speed WiFi, a compact kitchen, mountain views, towels, and bed linen. Briançon old town is about 3 km away, and Briançon train station is about 2 km away. The apartment is available in July, August, and the first half of September, with a 3-night minimum stay. Indicative rate: 80-85 EUR per night. Check-in is from 16:00 and check-out is until 10:00. Discounts for longer stays can be discussed."
    local_title: "Summer stays around Briançon"
    local_body: "The apartment is a practical base for hiking near Briançon, cycling classic Alpine roads and cols, visiting the Vauban old town, and exploring summer destinations such as the Clarée valley, the Écrins area, Serre Chevalier, and Villard-Saint-Pancrace."
    section: about

