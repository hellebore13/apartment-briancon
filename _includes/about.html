{% assign current_locale = page.locale | default: site.locale %}
{% assign text = site.data.sitetext[current_locale] %}

<section class="page-section" id="{{ text.about.section | default: 'about' }}">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section-heading text-uppercase">{{ text.about.title | default: "About" }}</h2>
        <h3 class="section-subheading text-muted">{{ text.about.text | default: "" }}</h3>
      </div>
    </div>
    <div class="row">
      <div class="col-lg-8 mx-auto text-center">
        <div class="large text-muted">{{ text.about.body | markdownify }}</div>
      </div>
    </div>
  </div>
</section>
