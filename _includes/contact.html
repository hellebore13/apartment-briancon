{% assign current_locale = page.locale | default: site.locale %}
{% assign text = site.data.sitetext[current_locale] %}

<section class="page-section" id="{{ text.contact.section | default: 'contact' }}">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section-heading text-uppercase">{{ text.contact.title | markdownify | default: "Contact Us" }}</h2>
        <h3 class="section-subheading text-muted">{{ text.contact.text | default: "" }}</h3>
      </div>
    </div>
    <div class="row">
      <div class="col-lg-12">
        <form id="contactForm" action="https://formspree.io/{% if site.formspree_form_path %}{{ site.formspree_form_path }}{% else %}{{ site.email }}{% endif %}" novalidate="novalidate" method="POST">
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <input name="name" class="form-control" id="name" type="text" placeholder="{{ text.contact.name | default: 'Name*' }}" required="required" data-validation-required-message="{{ text.contact.name-validation | default: 'Please enter your name.' }}">
                <p class="help-block text-danger"></p>
              </div>
              <div class="form-group d-none">
                <input name="username" class="form-control" id="username" type="text" tabindex="-1" autocomplete="off">
              </div>
              <div class="form-group">
                <input name="email" class="form-control" id="email" type="email" placeholder="{{ text.contact.email | default: 'Email*' }}" required="required" data-validation-required-message="{{ text.contact.email-validation | default: 'Please enter your email address.' }}">
                <p class="help-block text-danger"></p>
              </div>
              <div class="form-group">
                <input name="phone" class="form-control" id="phone" type="tel" placeholder="{{ text.contact.phone | default: 'Phone Number' }}">
                <p class="help-block text-danger"></p>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <textarea name="message" class="form-control" id="message" placeholder="{{ text.contact.message | default: 'Message*' }}" required="required" data-validation-required-message="{{ text.contact.message-validation | default: 'Please enter a message.' }}"></textarea>
                <p class="help-block text-danger"></p>
              </div>
            </div>
            <input type="hidden" name="_subject" id="email-subject" value="{{ text.contact.subject | default: 'Contact Form Submission' }}">
            <div class="clearfix"></div>
            <div class="col-lg-12 text-center">
              <div id="success"></div>
              <button id="sendMessageButton" class="btn btn-primary btn-xl text-uppercase" type="submit">{{ text.contact.submit | default: "Send Message" }}</button>
            </div>
            <input type="text" name="_gotcha" style="display:none">
            <input type="hidden" name="_next" value="#">
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
